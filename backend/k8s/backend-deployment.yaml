apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-editor-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realtime-editor-backend
  template:
    metadata:
      labels:
        app: realtime-editor-backend
    spec:
      containers:
        - name: backend
          image: realtime-editor-backend:latest
          ports:
            - containerPort: 17808
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: SERVER_PORT
              value: "17808"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/realtime_editor
            - name: SPRING_DATASOURCE_USERNAME
              value: realtimeeditor
            - name: SPRING_DATASOURCE_PASSWORD
              value: realtimeeditor
            - name: APP_JWT_SECRET
              value: change-this-secret-to-a-long-random-value-at-least-32-characters
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-editor-backend
spec:
  selector:
    app: realtime-editor-backend
  ports:
    - port: 17808
      targetPort: 17808
  type: ClusterIP
