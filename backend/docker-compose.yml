services:
  mysql:
    image: mysql:8.4
    container_name: realtime-editor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: realtime_editor
    ports:
      - "3306:3306"
    networks:
      - realtime-editor-net
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
    container_name: realtime-editor-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/realtime_editor?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_JWT_SECRET: change-this-secret-to-a-long-random-value-at-least-32-characters
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - realtime-editor-net

networks:
  realtime-editor-net:
    driver: bridge

volumes:
  mysql_data:
