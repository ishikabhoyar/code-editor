services:
  backend:
    build:
      context: /vm-storage/projects/code-editor/backend
      dockerfile: /vm-storage/projects/code-editor/backend/Dockerfile
    container_name: realtime-editor-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5433/void_db
      SPRING_DATASOURCE_USERNAME: void_user
      SPRING_DATASOURCE_PASSWORD: change_me
      APP_JWT_SECRET: change-this-secret-to-a-long-random-value-at-least-32-characters
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
      SERVER_PORT: 17808
    ports:
      - "17808:17808"
