server:
  port: ${SERVER_PORT:17808}

spring:
  application:
    name: realtime-collaborative-code-editor-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/void_db}
    username: ${SPRING_DATASOURCE_USERNAME:void_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-to-a-long-random-value-at-least-32-characters}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
  execution:
    timeout-seconds: ${APP_EXECUTION_TIMEOUT_SECONDS:5}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
